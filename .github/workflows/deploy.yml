name: Deploy nexus-backend to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wrangler
        run: npm install -g wrangler@latest

      - name: Check secrets
        run: |
          [ -n "$CF_TOKEN" ]   && echo "✅ token set"   || echo "❌ CLOUDFLARE_API_TOKEN missing"
          [ -n "$CF_ACCOUNT" ] && echo "✅ account set" || echo "❌ CLOUDFLARE_ACCOUNT_ID missing"
          cat wrangler.toml
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy
        run: wrangler deploy --verbose
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
