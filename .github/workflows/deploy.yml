name: Deploy nexus-backend to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify secrets present
        run: |
          echo "Checking secrets..."
          [ -n "$TOKEN" ] && echo "✅ CLOUDFLARE_API_TOKEN set" || (echo "❌ CLOUDFLARE_API_TOKEN missing" && exit 1)
          [ -n "$ACCOUNT" ] && echo "✅ CLOUDFLARE_ACCOUNT_ID set" || (echo "❌ CLOUDFLARE_ACCOUNT_ID missing" && exit 1)
          echo "--- wrangler.toml ---"
          cat wrangler.toml
        env:
          TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
