name: Deploy nexus-backend to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check secrets are present
        run: |
          [ -n "$CF_TOKEN" ]   && echo "✅ CLOUDFLARE_API_TOKEN is set" || (echo "❌ CLOUDFLARE_API_TOKEN is MISSING - add it to repo secrets" && exit 1)
          [ -n "$CF_ACCOUNT" ] && echo "✅ CLOUDFLARE_ACCOUNT_ID is set" || (echo "❌ CLOUDFLARE_ACCOUNT_ID is MISSING - add it to repo secrets" && exit 1)
          echo "--- wrangler.toml ---"
          cat wrangler.toml
          echo "--- worker.js (first 5 lines) ---"
          head -5 worker.js
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: "."
