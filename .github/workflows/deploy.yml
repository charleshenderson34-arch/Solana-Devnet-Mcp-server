name: Deploy nexus-backend to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Check secrets
        run: |
          [ -n "$CF_TOKEN" ] && echo "✅ CLOUDFLARE_API_TOKEN set" || (echo "❌ CLOUDFLARE_API_TOKEN MISSING" && exit 1)
          [ -n "$CF_ACCOUNT_ID" ] && echo "✅ CLOUDFLARE_ACCOUNT_ID set" || (echo "❌ CLOUDFLARE_ACCOUNT_ID MISSING" && exit 1)
          echo "--- wrangler.toml ---"
          cat wrangler.toml
          echo "--- worker.js exists ---"
          ls -lh worker.js
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: '3.101.0'
          workingDirectory: "."
          
name: Deploy nexus-backend to Cloudflare Workers

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-node@v4.4.0
        with:
          node-version: '20'
      - uses: cloudflare/wrangler-action@v3.14.1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
