name = "nexus-backend"
main = "worker.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "production"

# Secrets are injected at runtime via `wrangler secret put`.
# Run each command once from your terminal:
#
#   npx wrangler secret put THIRDWEB_SECRET_KEY  --name nexus-backend
#   npx wrangler secret put THIRDWEB_CLIENT_ID   --name nexus-backend
#   npx wrangler secret put SOLANA_PRIVATE_KEY   --name nexus-backend
#   npx wrangler secret put ANTHROPIC_API_KEY    --name nexus-backend
#   npx wrangler secret put JWT_SECRET           --name nexus-backend
#   npx wrangler secret put SOLANA_RPC_URL       --name nexus-backend
#   npx wrangler secret put ALLOWED_ORIGINS      --name nexus-backend

name = "your-worker-name"
main = "src/index.js"
compatibility_date = "2024-01-01"
account_id = "9dcc6dd59d55b7066026b0962f822e4f"  # ← required

- name: Deploy to Cloudflare Workers
  uses: cloudflare/wrangler-action@v3
  with:
    apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}  # add this
  with:
    apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    command: whoami
